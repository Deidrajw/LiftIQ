<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Training Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f11;--bg2:#18181b;--bg3:#222226;
  --bd:#2a2a2f;--bd2:#3a3a42;
  --tx:#f4f4f6;--t2:#8b8b96;--t3:#4a4a54;
  --or:#e8673a;--bl:#2d6ef5;--gr:#1db87a;--re:#ff453a;--am:#ffd60a;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Outfit",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh}

/* TOP BAR */
.topbar{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:99}
.tb{flex:1;padding:13px 4px;font-size:12px;font-weight:700;letter-spacing:.03em;border:none;background:0;color:var(--t3);cursor:pointer;transition:color .15s}
.tb.on{color:var(--or);border-bottom:2px solid var(--or)}
.imp-banner{display:none;align-items:center;gap:8px;padding:8px 14px;background:#1db87a12;border-bottom:1px solid #1db87a30;font-size:11px;color:var(--gr)}

/* COACH STATUS CARD */
.coach-card{margin:14px 16px 10px;background:linear-gradient(160deg,#1e1e24 0%,var(--bg2) 100%);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.cc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.cc-meso{font-size:11px;font-weight:700;color:var(--or);letter-spacing:.06em;text-transform:uppercase}
.cc-week{font-size:11px;font-weight:600;color:var(--t2)}
.cc-phase{font-size:20px;font-weight:800;color:var(--tx);padding:6px 16px 2px;letter-spacing:-.02em}
.cc-focus{font-size:13px;color:var(--t2);padding:0 16px 12px;line-height:1.5}
.cc-chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-top:1px solid var(--bd)}
.chip{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px}
.chip-r{background:#ff453a14;border:1px solid #ff453a30;color:var(--re)}
.chip-a{background:#ffd60a14;border:1px solid #ffd60a30;color:var(--am)}
.chip-b{background:#2d6ef514;border:1px solid #2d6ef530;color:var(--bl)}
.chip-g{background:#1db87a14;border:1px solid #1db87a30;color:var(--gr)}

/* GYM */
.sp{padding:10px 16px 12px;border-bottom:1px solid var(--bd)}
.sp-l{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.sp-w{display:flex;flex-wrap:wrap;gap:6px}
.sb{font-size:12px;font-weight:600;padding:7px 13px;border-radius:9px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s}
.sb.on{background:var(--or);border-color:var(--or);color:#fff}
.el{padding:10px 16px;display:flex;flex-direction:column;gap:8px}

/* EXERCISE CARD */
.ec{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.ec-h{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 10px;cursor:pointer;user-select:none}
.ec-n{font-size:14px;font-weight:700}
.ec-s{font-size:11px;color:var(--t2);margin-top:1px}
.ec-rec{font-size:10px;font-weight:700;margin-top:2px;display:block}
.ec-a{color:var(--t3);font-size:20px;transition:transform .2s;line-height:1}
.ec.open .ec-a{transform:rotate(90deg)}
.ec-b{display:none;border-top:1px solid var(--bd)}.ec.open .ec-b{display:block}
.ec-timer{font-size:10px;font-weight:700;color:var(--bl);padding:3px 8px;border-radius:8px;background:#2d6ef512;border:1px solid #2d6ef525;cursor:pointer;white-space:nowrap}

/* SET TABLE */
.sth{display:grid;grid-template-columns:40px 1fr 1fr 52px 40px;padding:7px 14px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}
.sr{display:grid;grid-template-columns:40px 1fr 1fr 52px 40px;padding:9px 14px;font-size:12px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.sr:last-child{border-bottom:none}
.sr.wu{color:var(--t2)}.sr.top{background:#1db87a08;font-weight:600}.sr.bo{background:#2d6ef508}.sr.dr{background:#e8673a08}
.sn{font-size:11px;font-weight:700}
.sn.wu{color:var(--t3)}.sn.top{color:var(--gr)}.sn.bo{color:var(--bl)}.sn.dr{color:var(--or)}
.pv{color:var(--t3);font-size:11px}.tv{color:var(--tx);font-weight:600;font-size:12px}.rv{font-size:10px;color:var(--t2)}
.ck{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--bd2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;margin:0 auto;transition:all .18s}
.ck.done{background:var(--or);border-color:var(--or)}
.fgr{margin:7px 14px 10px;padding:7px 10px;background:#ffd60a0e;border-radius:9px;font-size:11px;color:var(--am);line-height:1.5}
.act-btn{font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer}
.swap-btn{border:1px solid var(--bd2);background:var(--bg3);color:var(--t2)}
.rem-btn{border:1px solid #ff453a30;background:#ff453a0a;color:var(--re)}

/* POOL */
.pool-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 6px}
.pool-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--bd);background:var(--bg3);margin-bottom:6px;cursor:pointer;user-select:none;transition:border-color .15s}
.pool-item.pool-on{border-color:var(--or);background:#e8673a0a}
.pool-wu{border-color:#1db87a30;background:#1db87a0a;cursor:default}
.pchk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--bd2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;flex-shrink:0;transition:all .15s}
.pchk.on{background:var(--or);border-color:var(--or)}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px}
.plast{font-size:10px;color:var(--t3);display:block;margin-bottom:2px}
.pflag{font-size:10px;color:var(--am);margin-top:2px}
.ptimer{font-size:11px;font-weight:700;color:var(--bl);flex-shrink:0;padding:4px 8px;border-radius:8px;background:#2d6ef512;border:1px solid #2d6ef530;cursor:pointer;white-space:nowrap}
.start-btn{width:100%;margin-top:14px;padding:14px;background:var(--or);border:none;border-radius:12px;font-size:14px;font-weight:800;color:#fff;cursor:pointer}

/* COACH BRIEF */
.coach-brief{margin:10px 16px 4px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.coach-brief-hd{padding:10px 14px;font-size:10px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bd)}
.cbrow{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.cbrow:last-child{border-bottom:none}
.cbbadge{font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.cbname{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px}
.cbreason{font-size:11px;color:var(--t2);line-height:1.5}
.cbcaution{font-size:10px;color:var(--am);margin-top:4px}

/* TIMER BAR */
.stoggle-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px}
.stoggle{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s}
.stoggle-on{background:#ffd60a18;border-color:#ffd60a50;color:var(--am)}
.stoggle-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:10px 16px 4px}
.ins-win-card{background:var(--bg2);border:1px solid #1db87a30;border-radius:13px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.ins-win-icon{font-size:22px;flex-shrink:0}
.ins-win-title{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:3px}
.ins-win-body{font-size:11px;color:var(--t2);line-height:1.5}
.ins-card{border-radius:12px;border:1px solid var(--bd);border-left-width:3px;padding:11px 14px;margin-bottom:8px}
.ins-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ins-icn{font-size:14px;flex-shrink:0}
.ins-title{font-size:12px;font-weight:800;color:var(--tx)}
.ins-body{font-size:11px;color:var(--t2);line-height:1.6}
.meso-level{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.meso-badge{font-size:8px;font-weight:800;padding:3px 7px;border-radius:4px;letter-spacing:.08em;flex-shrink:0;margin-top:2px;white-space:nowrap}
.meso-micro{background:#2d6ef520;color:var(--bl)}
.meso-meso{background:#e8673a20;color:var(--or)}
.meso-macro{background:#ffd60a18;color:var(--am)}
.meso-level-name{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px}
.meso-level-body{font-size:11px;color:var(--t2);line-height:1.5}
#timerBar{display:none;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:46px;z-index:90}

/* INTELLIGENCE */
.iw{padding:14px}
.its{display:flex;gap:2px;margin-bottom:14px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:3px;overflow-x:auto}
.it{flex:1;font-size:10px;font-weight:700;padding:8px 4px;border-radius:8px;border:none;background:0;color:var(--t3);cursor:pointer;text-align:center;white-space:nowrap;min-width:0}
.it.on{background:var(--or);color:#fff}
.ip{display:none}.ip.on{display:block}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dash-sec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px}
.dash-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.dash-card.win{border-color:#1db87a30;background:#1db87a08}
.dash-card.warn{border-color:#ffd60a30;background:#ffd60a08}
.dash-card.coach{border-color:#e8673a30;background:#e8673a08}
.dash-card.suggest{border-color:#2d6ef530;background:#2d6ef508}
.dash-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.dash-title{font-size:12px;font-weight:800;color:var(--tx);margin-bottom:3px}
.dash-body{font-size:11px;color:var(--t2);line-height:1.5}

/* WHAT CHANGED */
.change-list{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;margin-bottom:10px;overflow:hidden}
.change-row{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.change-row:last-child{border-bottom:none}
.change-icon{font-size:16px;font-weight:800;flex-shrink:0}
.change-name{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px}
.change-reason{font-size:11px;color:var(--t2);line-height:1.5}

/* NEXT WEEK */
.nx-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;margin-bottom:10px;overflow:hidden}
.nx-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd)}
.nx-name{font-size:14px;font-weight:800;color:var(--tx)}
.nx-badge{font-size:9px;font-weight:700;padding:4px 9px;border-radius:20px}
.nx-stats{display:grid;grid-template-columns:1fr 1fr;padding:10px 14px;gap:8px;border-bottom:1px solid var(--bd)}
.nx-stat-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.nx-stat-v{font-size:12px;color:var(--t2)}
.nx-reason{padding:10px 14px;font-size:11px;color:var(--tx);line-height:1.5}
.nx-caution{padding:0 14px 10px;font-size:11px;color:var(--am);display:flex;gap:6px}
.nx-vol-warn{background:#ffd60a0a;border:1px solid #ffd60a30;border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:11px;color:var(--am);line-height:1.5;display:flex;gap:8px}

/* TRAINING MAP */
.phase-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.phase-card{flex:1;min-width:80px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:10px}
.phase-active{border-color:var(--or)}
.phase-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.phase-name{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:2px}
.phase-period{font-size:10px;color:var(--t3)}
.week-row{display:flex;gap:3px}
.wdot{flex:1;height:28px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t3)}
.wdot-active{background:var(--or);color:#fff}
.wdot-done{background:#1db87a33;color:var(--gr)}
.map-lift{margin-bottom:12px}
.map-lift-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.map-lift-name{color:var(--tx);font-weight:600}
.map-lift-vals{color:var(--t2)}
.map-bar-bg{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:3px}
.map-bar-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--or));border-radius:3px;transition:width .4s}
.map-bar-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--t3)}

/* AUDIT */
.vol-row{margin-bottom:8px}
.vol-bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.vol-bar-fill{height:100%;border-radius:3px}
.apill{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin:3px 3px 3px 0}
.apill.g{background:#1db87a20;color:var(--gr)}.apill.a{background:#ffd60a18;color:var(--am)}

/* SHARED */
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:13px;margin-bottom:10px}
.cl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.bx{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px}
.bl2{font-size:10px;color:var(--t3);margin-bottom:3px}.bv{font-size:19px;font-weight:800}.bs{font-size:10px;color:var(--t2);margin-top:2px}
.ib{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:4px 13px;margin-bottom:10px}
.ir{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--bd);font-size:11px;color:var(--t2);line-height:1.6}
.ir:last-child{border-bottom:none}.ir strong{color:var(--tx)}
.g{color:var(--gr)}.r{color:var(--re)}.a{color:var(--am)}.b{color:var(--bl)}
.irb{font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s}
.irb.on{background:var(--or);border-color:var(--or);color:#fff}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px;line-height:1.6}

/* EXERCISE MODAL */
.ex-grp{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px}
.ex-item{padding:12px 14px;border-bottom:1px solid #2a2a2f33;cursor:pointer}
.ex-item:active{background:var(--bg3)}
</style>
</head>
<body>
<input type="file" id="csvIn" accept=".csv" style="display:none" onchange="onFileSelect(event)">

<div class="topbar">
  <button class="tb on" onclick="setMode('gym',this)">&#127947; GYM</button>
  <button class="tb" onclick="setMode('ana',this)">&#129504; INTELLIGENCE</button>
</div>

<div class="imp-banner" id="importBanner"></div>

<!-- ═══ GYM MODE ═══ -->
<div id="gym">
  <!-- Coach Status Card -->
  <div class="coach-card" id="coachCard"></div>

  <!-- Status toggles -->
  <div class="stoggle-label">Today&#8217;s status</div>
  <div class="stoggle-row" id="statusToggles"></div>

  <!-- Next Session Coach -->
  <div style="padding:0 16px" id="nextSessionCoachWrap"><div id="nextSessionCoach"></div></div>

  <!-- Session Picker -->
  <div class="sp">
    <div class="sp-l">Session</div>
    <div class="sp-w">
      <button class="sb" onclick="pick('post',this)">Posterior Chain</button>
      <button class="sb" onclick="pick('gq',this)">Glute &amp; Quad</button>
      <button class="sb" onclick="pick('uni',this)">Unilateral (Apt)</button>
      <button class="sb" onclick="pick('pull',this)">Upper Pull</button>
      <button class="sb" onclick="pick('push',this)">Upper Push</button>
    </div>
  </div>

  <!-- Step 2: Exercise Pool -->
  <div id="exPool" style="display:none;padding:12px 16px">
    <div id="poolList"></div>
  </div>

  <!-- Step 3: Active Session -->
  <div id="activeSess" style="display:none">
    <div id="timerBar">
      <div style="flex:1;background:#2a2a2f;border-radius:4px;height:4px;overflow:hidden">
        <div id="timerFill" style="height:100%;background:var(--or);width:100%;transition:width 1s linear;border-radius:4px"></div>
      </div>
      <span id="timerCount" style="font-size:20px;font-weight:800;font-family:monospace;color:var(--or);min-width:44px">0:00</span>
      <button onclick="dismissTimer()" style="background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer">&#10005;</button>
    </div>
    <div class="el" id="el"></div>
  </div>
</div>

<!-- ═══ INTELLIGENCE MODE ═══ -->
<div id="ana" style="display:none">
  <div class="iw">
    <div class="its">
      <button class="it on" onclick="iTab('dash',this)">Home</button>
      <button class="it" onclick="iTab('changed',this)">Changed</button>
      <button class="it" onclick="iTab('next',this)">Next</button>
      <button class="it" onclick="iTab('map',this)">Map</button>
      <button class="it" onclick="iTab('insights',this)">Insights</button>
      <button class="it" onclick="iTab('import',this)">Import</button>
    </div>
    <div id="t-dash"     class="ip on"></div>
    <div id="t-changed"  class="ip"></div>
    <div id="t-next"     class="ip"></div>
    <div id="t-map"      class="ip"></div>
    <div id="t-insights" class="ip"></div>
    <div id="t-import"   class="ip"></div>
  </div>
</div>

<!-- EXERCISE SELECTOR MODAL -->
<div id="exModal" style="display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--bd)">
      <div id="exModalTitle" style="font-size:16px;font-weight:800">Add exercise</div>
      <button onclick="closeExModal()" style="background:none;border:none;color:var(--t3);font-size:22px;cursor:pointer">&#10005;</button>
    </div>
    <div style="padding:10px 14px;border-bottom:1px solid var(--bd)">
      <input id="exSearch" type="text" placeholder="Search exercises..." oninput="renderExList(this.value)"
        style="width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);font-size:13px">
    </div>
    <div id="exModalList" style="overflow-y:auto;flex:1;padding:6px 0"></div>
  </div>
</div>
<script>













// ═══════════════════════════════════════
// LAYER 1: TRAINING PROFILE (static, never changes)
// ═══════════════════════════════════════
var PROFILE = {
  goal: "Glute growth, posterior chain strength, visible definition",
  avoidExcess: ["Back","Lats","Shoulders","Chest"],
  priorityMuscles: ["Glutes","Hamstrings","Glute Med"],
  maintenanceMuscles: ["Back","Shoulders","Chest"],
  injuryFlags: {knee:true, ankle:true, back:false},
  safetyRules: [
    "No failure on RDL, BSS, or back extensions",
    "Avoid sled and jumping during ankle issues",
    "Pause BSS progression when knee pain is active",
    "Keep upper pull volume controlled — definition, not width"
  ],
  priorityLifts: [
    "Glute Drive","Romanian Deadlift (Barbell)",
    "Bulgarian Split Squat (Smith Machine)","Rear Kick (Machine)",
    "Seated Leg Curl (Machine)","Hip Thrust (Machine)",
    "Lying Leg Curl (Machine)","Lat Pulldown (Cable)"

// EXERCISE NAME NORMALIZATION (single source of truth)
// normalizeExerciseName(): raw Hevy name -> canonical key
//   used by: imports, muscle mapping, recommendations,
//   safety rules, comparisons, target matching.

var _HMAP_CI = null;
function normalizeExerciseName(name) {
  name = String(name || "").replace(/"/g, "").replace(/\s+/g, " ").trim();
  if (!name) return "";
  if (HMAP[name]) return HMAP[name];
  if (!_HMAP_CI) {
    _HMAP_CI = {};
    Object.keys(HMAP).forEach(function(k){ _HMAP_CI[k.toLowerCase()] = HMAP[k]; });
  }
  return _HMAP_CI[name.toLowerCase()] || name;
}
function shortName(name) {
  return String(name || "").replace(/ \([^)]+\)/g, "");
}

function calcBanner() {
  var today = new Date();
  var result = {label:"M8",name:"Hypertrophy",week:1,totalWeeks:8,
    phase:"Accumulate",focus:"Establish baseline loads.",rpe:"7.5–8.5",reps:"8–12"};
  for (var mi = 0; mi < MESO_PLAN.length; mi++) {
    var m = MESO_PLAN[mi];
    var s = new Date(m.start), e = new Date(m.end);
    if (today >= s && today <= e) {
      var wk = Math.min(Math.floor((today-s)/604800000)+1, m.weeks.length);
      var wd = m.weeks[wk-1] || m.weeks[0];
      result = {label:m.label,name:m.name,week:wk,totalWeeks:m.weeks.length,
        phase:wd.phase,focus:wd.focus,rpe:m.rpe,reps:m.reps};
      break;
    }
  }
  return result;
}

// LAYER 3: COACH ENGINE
// ═══════════════════════════════════════
function runEngine() {
  STATE.improved = []; STATE.stalled = []; STATE.warnings = [];
  STATE.wins = []; STATE.recommendations = {};

  PROFILE.priorityLifts.forEach(function(lk) {
    var d = STATE.lifts[lk];
    if (!d || !d.lastW) return;
    var tgt = PROFILE.liftTargets[lk] || {targetR:8};
    var targetR = tgt.targetR;
    var jump = (lk.indexOf("Split Squat")!==-1||lk.indexOf("Belt")!==-1) ? 10 : 5;
    var rec = {lift:lk,lastW:d.lastW,lastR:d.lastR,lastRPE:d.lastRPE,lastE:d.lastE,
               sessionsAtWeight:d.sessionsAtWeight||0,target:d.lastW};

    // Injury rules — driven by CURRENT_STATUS (today), not PROFILE history
    if (CURRENT_STATUS.kneePain && lk.indexOf("Split Squat")!==-1) {
      rec.action="injury"; rec.badge="INJURY — HOLD";
      rec.reason="Knee pain active. Hold at " + d.lastW + " lbs, modified depth.";
      rec.caution="Two pain-free sessions before attempting " + (d.lastW+jump) + " lbs.";
    } else if (CURRENT_STATUS.backTightness && lk.indexOf("Romanian")!==-1) {
      rec.action="reduce"; rec.badge="BACK CAUTION"; rec.target=Math.max(d.lastW-10,95);
      rec.reason="Back tightness active. Reduce RDL intensity.";
      rec.caution="Shift volume to B-stance RDL and leg curl this week.";
    } else if (CURRENT_STATUS.ankleIssue && (lk.indexOf("Lunge")!==-1||lk.indexOf("Sled")!==-1)) {
      rec.action="substitute"; rec.badge="AVOID — ANKLE";
      rec.reason="Ankle issue active. Skip impact/instability movements.";
      rec.caution="Substitute with BSS at reduced depth or B-stance RDL.";
    } else if (d.sessionsAtWeight >= 3) {
      rec.action="stall"; rec.badge="STALLED"; rec.target=d.lastW;
      rec.reason=d.sessionsAtWeight + " sessions at " + d.lastW + " lbs with no rep improvement.";
      rec.caution="Add drop set at " + Math.round(d.lastW*0.7/5)*5 + " lbs AMRAP, or run a 5x5 block.";
      STATE.stalled.push(lk);
      STATE.warnings.push({type:"stall",lift:lk,msg:d.lastW+" lbs for "+d.sessionsAtWeight+" sessions"});
    } else if (d.lastR >= targetR+2 && (d.lastRPE===null||d.lastRPE<=8.5)) {
      rec.action="increase"; rec.badge="INCREASE"; rec.target=d.lastW+jump;
      rec.reason="Hit "+d.lastR+" reps (target "+targetR+") at RPE "+(d.lastRPE||"—")+". Overflowed.";
      rec.caution=null;
      STATE.improved.push(lk);
      STATE.wins.push({lift:lk,msg:shortName(lk)+" ready for "+(d.lastW+jump)+" lbs"});
    } else if (d.lastRPE!==null && d.lastRPE>=9.0) {
      rec.action="hold"; rec.badge="HOLD — CEILING"; rec.target=d.lastW;
      rec.reason="RPE "+d.lastRPE+" at "+d.lastW+" lbs — at ceiling. More reps first.";
      rec.caution="Hit "+(targetR+1)+" clean reps, then earn "+(d.lastW+jump)+" lbs.";
    } else if (d.lastR >= targetR-1 && d.lastR < targetR+2) {
      rec.action="hold"; rec.badge="ON TARGET"; rec.target=d.lastW;
      rec.reason="On target: "+d.lastW+"×"+d.lastR+". Add 1 rep or tighten RPE, then increase.";
      rec.caution=null;
    } else if (d.lastR < targetR-2) {
      rec.action="reduce"; rec.badge="REDUCE"; rec.target=d.lastW-jump;
      rec.reason="Only "+d.lastR+" reps vs target "+targetR+". Drop to "+(d.lastW-jump)+" lbs.";
      rec.caution="Rebuild reps to "+targetR+"+ before going back up.";
      STATE.warnings.push({type:"regress",lift:lk,msg:shortName(lk)+" missed target"});
    } else {
      rec.action="building"; rec.badge="BUILDING"; rec.target=d.lastW;
      rec.reason="Building reps at "+d.lastW+" lbs. Keep going."; rec.caution=null;
    }
    // Post-processing: low recovery caps increases
    if (CURRENT_STATUS.lowRecovery && rec.action==="increase") {
      rec.action="hold"; rec.badge="HOLD — RECOVERY";
      rec.reason="Low recovery today. Hold load, chase reps instead.";
      rec.caution="Re-evaluate next session when recovery improves.";
    }
    STATE.recommendations[lk] = rec;
  });

  // Volume rules — only when real data exists
  if (!STATE.imported || STATE.exercisesAnalyzed === 0) return;
  var g=STATE.muscleVolume["Glutes"]||0, h=STATE.muscleVolume["Hamstrings"]||0;
  var b=STATE.muscleVolume["Back"]||0, gm=STATE.muscleVolume["Glute Med"]||0;
  if (g>0 && h < g*0.55)
    STATE.warnings.push({type:"volume",flag:"hamstring_gap",
      msg:"Hamstrings "+h+" sets vs Glutes "+g+" sets. Add 2–4 RDL or leg curl sets."});
  if (b < 6)
    STATE.warnings.push({type:"volume",flag:"pull_low",
      msg:"Back volume low ("+b+" sets). One pull session per week minimum."});
  if (gm < 6)
    STATE.warnings.push({type:"volume",flag:"glute_med",
      msg:"Glute medius "+gm+" sets. Banded abduction every session."});
}

  var allKeys = Object.keys(curr);

  if (!allKeys.length) {
    el.innerHTML = emptyState("No lift data in this import.","Try a wider date range."); return;
  }
  if (!hasPrev) {
    el.innerHTML = "<div class='cc'>" +
      "<div class='cl'>First import recorded</div>" +
      "<div style='font-size:12px;color:var(--t2);line-height:1.6'>" +
      "Baseline saved with "+allKeys.length+" exercises across "+STATE.sessions+" sessions.<br>" +
      "Import again after your next training week to see what changed." +
      "</div></div>" +
      "<div class='cc' style='margin-top:0'><div class='cl'>This import</div>" +
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>" +
      impStat("Sessions",STATE.sessions+"") +
      impStat("Exercises",allKeys.length+"") +
      impStat("Avg RPE",STATE.avgRPE?STATE.avgRPE.toFixed(1):"—") +
      impStat("Date range",STATE.dateRange.start+" \u2192 "+STATE.dateRange.end) +
      "</div></div>";
    return;
  }

  var improved=[],held=[],regressed=[],newLifts=[];
  allKeys.forEach(function(lk) {
    var c=curr[lk], p=prev[lk];
    var name=shortName(lk);
    if (!p) { newLifts.push({name:name,c:c}); return; }
    var eDiff=c.lastE-(p.lastE||0);
    var rpeDiff=(c.lastRPE!==null&&p.lastRPE!==null)?(p.lastRPE-c.lastRPE):0;
    if (c.lastW>p.lastW)
      improved.push({name:name,c:c,p:p,reason:"Load up: "+p.lastW+" \u2192 "+c.lastW+" lbs."});
    else if (c.lastW===p.lastW&&c.lastR>p.lastR)
      improved.push({name:name,c:c,p:p,reason:"More reps: "+p.lastR+" \u2192 "+c.lastR+" at "+c.lastW+" lbs."});
    else if (c.lastW===p.lastW&&c.lastR===p.lastR&&rpeDiff>=0.5)
      held.push({name:name,c:c,p:p,reason:"Same load/reps. RPE eased by "+rpeDiff.toFixed(1)+" \u2014 getting stronger at this weight."});
    else if (c.lastW===p.lastW&&c.lastR===p.lastR)
      held.push({name:name,c:c,p:p,reason:"Held: "+c.lastW+" lbs \u00d7"+c.lastR+(c.sessionsAtWeight>=3?" ("+c.sessionsAtWeight+" sessions \u2014 stall risk)":"")+"."});
    else if (c.lastR<p.lastR||c.lastW<p.lastW)
      regressed.push({name:name,c:c,p:p,reason:"Dropped: "+p.lastW+"\u00d7"+p.lastR+" \u2192 "+c.lastW+"\u00d7"+c.lastR+"."});
  });

  function changeList(items,col,icon) {
    return "<div class='change-list'>" + items.map(function(item) {
      return "<div class='change-row'><span class='change-icon "+col+"'>"+icon+"</span>" +
        "<div><div class='change-name'>"+item.name+"</div><div class='change-reason'>"+item.reason+"</div></div></div>";
    }).join("") + "</div>";
  }

  var html = "";

  // Session / RPE summary comparison
  var prevH = IMPORT_HISTORY.length>=2 ? IMPORT_HISTORY[1] : null;
  if (prevH) {
    var sessDiff = STATE.sessions - prevH.sessions;
    var rpeDiff2 = STATE.avgRPE && prevH.avgRPE ? (STATE.avgRPE-prevH.avgRPE).toFixed(1) : null;
    html += "<div class='cc'><div class='cl'>Import comparison</div>" +
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>" +
      impStat("Sessions",STATE.sessions+(sessDiff!==0?" ("+(sessDiff>0?"+":"")+sessDiff+")":"")) +
      impStat("Avg RPE",STATE.avgRPE?STATE.avgRPE.toFixed(1)+(rpeDiff2?" ("+(parseFloat(rpeDiff2)>0?"+":"")+rpeDiff2+")":""):"—") +
      impStat("Exercises",STATE.exercisesAnalyzed+"") +
      impStat("vs import",IMPORT_HISTORY.length>=2?new Date(prevH.importedAt).toLocaleDateString("en-CA",{month:"short",day:"numeric"}):"—") +
      "</div></div>";
  }

  if (improved.length) html += "<div class='dash-sec'>Improved</div>"+changeList(improved,"g","&#8593;");
  if (held.length) html += "<div class='dash-sec'>Held / Steady</div>"+changeList(held,"b","&#8594;");
  if (regressed.length) html += "<div class='dash-sec'>Regressed</div>"+changeList(regressed,"r","&#8595;");
  if (newLifts.length) {
    html += "<div class='dash-sec'>New this period</div><div class='change-list'>" +
      newLifts.slice(0,5).map(function(item) {
        return "<div class='change-row'><span class='change-icon b'>&#9679;</span>" +
          "<div><div class='change-name'>"+item.name+"</div>" +
          "<div class='change-reason'>First logged in this import period.</div></div></div>";
      }).join("") + "</div>";
  }

  // Volume note
  var gv=STATE.muscleVolume["Glutes"]||0, hv=STATE.muscleVolume["Hamstrings"]||0;
  if (gv>0&&hv<gv*0.6)
    html += "<div class='dash-sec'>Volume shift needed</div><div class='change-list'>" +
      "<div class='change-row'><span class='change-icon a'>&#9888;</span>" +
      "<div><div class='change-name'>Hamstrings trailing</div>" +
      "<div class='change-reason'>"+hv+" sets vs "+gv+" glute sets. Add 2\u20134 hard sets next week.</div></div></div></div>";

  if (!html) html = "<div style='padding:16px;color:var(--t2);font-size:12px'>Not enough data to compare. Import again after your next training week.</div>";
  el.innerHTML = html;
}

function showWeekDetail(w) {
  var b = calcBanner();
  var detail = document.getElementById("weekDetail");
  if (!detail) return;
  var cur = detail.dataset.open;
  if (cur===String(w)) { detail.style.display="none"; detail.dataset.open=""; return; }
  detail.dataset.open = String(w);

  var meso = null, wkData = null;
  MESO_PLAN.forEach(function(m){ if(m.label===b.label){ meso=m; if(m.weeks[w-1]) wkData=m.weeks[w-1]; } });
  if (!wkData) return;

  var phaseColors = {Accumulate:"var(--bl)",Load:"var(--or)",Strength:"#bf5af2",
                     Peak:"var(--re)",Deload:"var(--t3)",Intro:"var(--bl)",
                     Build:"var(--or)",Reintro:"var(--gr)"};
  var col = phaseColors[wkData.phase]||"var(--t2)";

  // ── Aggregate imported data for this calendar week ──
  var mesoStart = new Date(meso.start+"T12:00:00");
  var wkStart = new Date(mesoStart.getTime() + (w-1)*604800000);
  var wkEnd   = new Date(wkStart.getTime() + 604800000);
  function inWeek(dk){ var t=new Date(dk+"T12:00:00").getTime(); return t>=wkStart.getTime() && t<wkEnd.getTime(); }

  var dates = Object.keys(STATE.dailyLog||{}).sort();
  var wkDates = dates.filter(inWeek);
  var priorDates = dates.filter(function(dk){ return new Date(dk+"T12:00:00").getTime() < wkStart.getTime(); });

  var dataHtml = "";
  if (wkDates.length) {
    var sets=0, rpes=[], bestByLift={}, mVol={};
    wkDates.forEach(function(dk){
      var d = STATE.dailyLog[dk];
      sets += d.sets; rpes = rpes.concat(d.rpes);
      Object.keys(d.ex).forEach(function(lk){
        var e = d.ex[lk];
        if (!bestByLift[lk] || e.e1 > bestByLift[lk].e1) bestByLift[lk] = e;
        var m = PROFILE.muscleMap[lk];
        if (m) mVol[m] = (mVol[m]||0) + 1;
      });
    });
    var avgRPE = rpes.length ? (rpes.reduce(function(a,x){return a+x;},0)/rpes.length).toFixed(1) : "\u2014";

    // Top lifts by e1RM this week
    var top = Object.keys(bestByLift).sort(function(a,c){return bestByLift[c].e1-bestByLift[a].e1;}).slice(0,3)
      .map(function(lk){ var e=bestByLift[lk]; return shortName(lk)+" "+e.w+"\u00d7"+e.r+" (e1RM "+e.e1+")"; });

    // Best e1RM changes vs before this week
    var deltas = [];
    Object.keys(bestByLift).forEach(function(lk){
      var priorBest = 0;
      priorDates.forEach(function(dk){
        var e = STATE.dailyLog[dk].ex[lk];
        if (e && e.e1 > priorBest) priorBest = e.e1;
      });
      if (priorBest > 0) deltas.push({lk:lk, d:bestByLift[lk].e1 - priorBest});
    });
    deltas.sort(function(a,c){return c.d-a.d;});
    var deltaStr = deltas.slice(0,2).map(function(x){
      return shortName(x.lk)+" "+(x.d>=0?"+":"")+x.d+" lbs e1RM";
    }).join(" \u00b7 ");

    var volStr = Object.keys(mVol).sort(function(a,c){return mVol[c]-mVol[a];})
      .map(function(m){return m+" "+mVol[m];}).join(" \u00b7 ");

    // Dynamic coach note for the week
    var note;
    if (deltas.length && deltas[0].d >= 5) note = shortName(deltas[0].lk)+" moved "+deltas[0].d+" lbs e1RM \u2014 momentum. Ride it, don\u2019t chase every lift at once.";
    else if (rpes.length && parseFloat(avgRPE) > 8.7) note = "Avg RPE "+avgRPE+" is hot for "+wkData.phase+". Watch recovery before adding load.";
    else if (rpes.length && parseFloat(avgRPE) < 7.0 && wkData.phase!=="Deload") note = "Avg RPE "+avgRPE+" is soft \u2014 working sets should live at 7.5+ this phase.";
    else note = wkDates.length+" session"+(wkDates.length>1?"s":"")+" banked. "+wkData.focus;

    dataHtml =
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px'>" +
        impStat("Sessions", wkDates.length+"") +
        impStat("Avg RPE", avgRPE) +
      "</div>" +
      (top.length ? "<div style='font-size:11px;color:var(--t2);margin-top:8px;line-height:1.6'><strong style='color:var(--tx)'>Top lifts:</strong> "+top.join("<br>")+"</div>" : "") +
      (deltaStr ? "<div style='font-size:11px;color:var(--gr);margin-top:6px'>&#8593; "+deltaStr+"</div>" : "") +
      (volStr ? "<div style='font-size:11px;color:var(--t2);margin-top:6px'><strong style='color:var(--tx)'>Volume:</strong> "+volStr+" sets</div>" : "") +
      "<div style='font-size:11px;color:var(--am);margin-top:8px;line-height:1.6'>&#127947; "+note+"</div>";
  } else {
    dataHtml = "<div style='font-size:11px;color:var(--t3);margin-top:8px'>" +
      (w > b.week ? "Upcoming \u2014 no data yet. "+wkData.focus
                  : "No Hevy sessions imported for this week.") + "</div>";
  }

  detail.innerHTML = "<div style='margin:10px 0 0;padding:10px 14px;background:var(--bg3);border-radius:10px;border-left:3px solid "+col+"'>" +
    "<div style='font-size:10px;font-weight:700;color:"+col+";text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px'>Week "+w+" \u2014 "+wkData.phase+"</div>" +
    "<div style='font-size:12px;color:var(--tx);font-weight:600;margin-bottom:4px'>"+b.name+", "+b.rpe+" RPE \u00b7 "+b.reps+" reps</div>" +
    "<div style='font-size:11px;color:var(--t2);line-height:1.6'>"+wkData.focus+"</div>" +
    dataHtml +
    "</div>";
  detail.style.display = "block";
}

// DERIVE BIGGEST WIN
// ═══════════════════════════════════════
function deriveBiggestWin(state, recs) {
  var b = calcBanner();
  state = state || STATE;
  recs = recs || state.recommendations || {};
  if (!state.imported) return null;

  // Previous import snapshot — same source Changed uses
  var prevSnap = IMPORT_HISTORY.length >= 2 ? IMPORT_HISTORY[1] : null;
  var prevLifts = prevSnap ? prevSnap.lifts : (state.prevLifts || {});
  var hasPrev = prevLifts && Object.keys(prevLifts).length > 0;

  // 1. Stalled lift resolved — the hardest win to earn
  if (prevSnap && prevSnap.warnings) {
    var prevStalls = prevSnap.warnings.filter(function(w){return w.type==="stall";}).map(function(w){return w.lift;});
    var resolved = prevStalls.filter(function(lk){ return state.stalled.indexOf(lk)===-1 && state.lifts[lk]; });
    if (resolved.length) {
      var rl = resolved[0], rd = state.lifts[rl];
      return {icon:"&#128165;", title:"Stall broken: "+shortName(rl),
        body:"This lift was flagged stalled last import. Now moving again"+(rd?" at "+rd.lastW+" lbs \u00d7"+rd.lastR:"")+". Breaking a plateau beats any single PR."};
    }
  }

  // 2. e1RM improvement on priority lift
  var bestE = null, bestDelta = 0;
  PROFILE.priorityLifts.forEach(function(lk) {
    var cur = state.lifts[lk], prev = prevLifts[lk];
    if (!cur || !prev || !cur.lastE || !prev.lastE) return;
    var d = cur.lastE - prev.lastE;
    if (d > bestDelta) { bestDelta = d; bestE = {lk:lk, cur:cur, prev:prev, d:d}; }
  });
  if (bestE) {
    return {icon:"&#128200;", title:"Strength win: "+shortName(bestE.lk),
      body:"e1RM up "+bestE.d+" lbs ("+bestE.prev.lastE+" \u2192 "+bestE.cur.lastE+" lbs). Momentum is real."};
  }

  // 3. More reps at same weight
  var bestR = null, bestRg = 0;
  PROFILE.priorityLifts.forEach(function(lk) {
    var cur = state.lifts[lk], prev = prevLifts[lk];
    if (!cur||!prev||cur.lastW!==prev.lastW) return;
    var g = cur.lastR - prev.lastR;
    if (g > bestRg) { bestRg=g; bestR={lk:lk,cur:cur,prev:prev,g:g}; }
  });
  if (bestR) {
    return {icon:"&#127919;", title:"Rep win: "+shortName(bestR.lk),
      body:bestR.prev.lastR+" \u2192 "+bestR.cur.lastR+" reps at "+bestR.cur.lastW+" lbs. That rep is the signal to step up."};
  }

  // 4. RPE improvement at same load+reps
  var bestRPE = null;
  PROFILE.priorityLifts.forEach(function(lk) {
    var cur = state.lifts[lk], prev = prevLifts[lk];
    if (!cur||!prev||!cur.lastRPE||!prev.lastRPE) return;
    if (cur.lastW===prev.lastW && cur.lastR===prev.lastR && prev.lastRPE-cur.lastRPE >= 0.5)
      bestRPE = {lk:lk,cur:cur,prev:prev};
  });
  if (bestRPE) {
    return {icon:"&#127775;", title:"Efficiency win: "+shortName(bestRPE.lk),
      body:"RPE dropped "+bestRPE.prev.lastRPE+" \u2192 "+bestRPE.cur.lastRPE+" at same load and reps. The weight is getting easier \u2014 step up when ready."};
  }

  // 5. Lift ready to increase (from coaching recommendations)
  var readyLk = null;
  PROFILE.priorityLifts.forEach(function(lk) {
    if (!readyLk && recs[lk] && recs[lk].action==="increase") readyLk = lk;
  });
  if (readyLk) {
    var rr2 = recs[readyLk];
    return {icon:"&#127942;", title:shortName(readyLk)+" ready to increase",
      body:rr2.lastW+" \u00d7"+rr2.lastR+(rr2.lastRPE?" @RPE "+rr2.lastRPE:"")+" overflowed the target. Next session: "+rr2.target+" lbs."};
  }

  // 6. Priority muscle volume improved vs last import
  if (prevSnap && prevSnap.muscleVolume) {
    var bestVol = null, bestVolGain = 0;
    PROFILE.priorityMuscles.forEach(function(m) {
      var c = state.muscleVolume[m]||0, p = prevSnap.muscleVolume[m]||0;
      if (p > 0 && c - p >= 3 && c - p > bestVolGain) { bestVolGain = c-p; bestVol = {m:m,c:c,p:p}; }
    });
    if (bestVol) return {icon:"&#128170;", title:bestVol.m+" volume up",
      body:bestVol.p+" \u2192 "+bestVol.c+" hard sets vs last import. Priority muscle getting priority treatment."};
  }

  // 7. Hamstring:glute ratio improved vs last import
  var g=state.muscleVolume["Glutes"]||0, h=state.muscleVolume["Hamstrings"]||0;
  if (prevSnap && prevSnap.muscleVolume) {
    var pg=prevSnap.muscleVolume["Glutes"]||0, ph=prevSnap.muscleVolume["Hamstrings"]||0;
    if (g>0 && pg>0 && ph/pg < h/g && h/g >= 0.5)
      return {icon:"&#9878;", title:"Hamstring:glute ratio improving",
        body:"Ratio moved "+(ph/pg).toFixed(2)+" \u2192 "+(h/g).toFixed(2)+". This is the single biggest lever for glute development and back health."};
  }

  // 8. Avg RPE in target zone
  if (state.avgRPE) {
    var rr = b.rpe.split("\u2013").map(parseFloat);
    if (rr.length===2 && state.avgRPE>=rr[0] && state.avgRPE<=rr[1])
      return {icon:"&#127919;", title:"Intensity aligned",
        body:"Avg RPE "+state.avgRPE.toFixed(1)+" sits inside the "+b.label+" target range ("+b.rpe+"). Training intensity is calibrated correctly."};
  }

  // 9. Progress toward block target e1RM
  var bestPct = 0, bestProg = null;
  PROFILE.priorityLifts.forEach(function(lk) {
    var d = state.lifts[lk], t = PROFILE.liftTargets[lk];
    if (!d||!t||!t.M8e) return;
    var pct = d.lastE/t.M8e;
    if (pct > bestPct) { bestPct=pct; bestProg={lk:lk,d:d,t:t,pct:Math.round(pct*100)}; }
  });
  if (bestProg && bestProg.pct >= 70) {
    return {icon:"&#127775;", title:"Map win: "+shortName(bestProg.lk),
      body:bestProg.d.lastE+" lbs e1RM \u2014 "+bestProg.pct+"% toward M8 target of "+bestProg.t.M8e+" lbs."};
  }

  // 10. Consistency
  if (state.sessions >= 10)
    return {icon:"&#9989;", title:"Consistency win",
      body:state.sessions+" sessions this period. Showing up is compounding. Most people don\u2019t."};

  // 11. Hamstring volume healthy (absolute)
  if (h>0&&g>0&&h/g>=0.6)
    return {icon:"&#128200;", title:"Volume balance",
      body:"Hamstrings at "+h+" sets vs glutes at "+g+". Ratio is healthy. Back health and glute development both depend on this."};

  // 12. No active flags
  if (!CURRENT_STATUS.kneePain&&!CURRENT_STATUS.ankleIssue&&!CURRENT_STATUS.backTightness)
    return {icon:"&#9989;", title:"Clean training block",
      body:"No active injury flags. Full movement capacity available. This is when real strength gains happen \u2014 don\u2019t waste it."};

  // 13. Fallback: on the plan
  return {icon:"&#127947;", title:"Week "+b.week+" of "+b.totalWeeks,
    body:"In "+b.name+", "+b.phase+" phase. The plan itself is the advantage \u2014 most people just react."};
}

// ═══════════════════════════════════════
// HISTORICAL LENS — picked from current data, not random rotation
// ═══════════════════════════════════════
function pickHistoricalLens(state) {
  state = state || STATE;
  var hasData = state.imported && state.exercisesAnalyzed > 0;
  var g = state.muscleVolume["Glutes"]||0, h = state.muscleVolume["Hamstrings"]||0;
  var back = state.muscleVolume["Back"]||0;

  if (hasData) {
    // 1. Glute Drive / Hip Thrust stalled → recapture framing
    var recapStall = state.stalled.filter(function(lk){
      return lk.indexOf("Glute Drive")!==-1 || lk.indexOf("Hip Thrust")!==-1;
    });
    if (recapStall.length)
      return {title:"Recapture, not plateau", body:shortName(recapStall[0])+" is stalled \u2014 but historically this is the lift where the most ground was lost since Dec 2023 and the most can be recovered. A stall here usually breaks with a rep reset, not more weight."};

    // 2. Hamstring gap active → the known limiter
    if (g>0 && h < g*0.55)
      return {title:"The old pattern is back", body:"Hamstrings trailing glutes ("+h+" vs "+g+" sets) is the exact pattern that historically caused back tightness and capped glute output. This limiter has bitten before \u2014 fix it before it fixes you."};

    // 3. Ratio healthy → the correction is holding
    if (g>0 && h/g >= 0.6)
      return {title:"Hamstring balance holding", body:"Historically, hamstrings trailing glutes limited glute development and back health. The current ratio ("+(h/g).toFixed(2)+") shows the correction is holding \u2014 this is quietly the biggest structural win of the rebuild."};

    // 4. Back volume low → the gym-switch drop
    if (back < 6)
      return {title:"Gym-switch echo: back volume", body:"Back volume dropped after the gym switch and it\u2019s low again ("+back+" sets). One dedicated pull session per week reverses this \u2014 definition, not width."};

    // 5. Glute Drive being trained → recapture opportunity
    if (state.lifts["Glute Drive"])
      return {title:"Glute Drive: biggest recapture opportunity", body:"Dec 2023 was the all-time peak. Glute Drive at "+state.lifts["Glute Drive"].lastE+" lbs e1RM is where the most ground was lost and the most can be recovered. Every session here is compound interest on the rebuild."};

    // 6. Consistent sessions → rebuild framing
    if (state.sessions >= 8)
      return {title:"The rebuild is tracking", body:"Sep 2025 was peak performance but also peak risk. The gym switch reset volume and RPE normally. "+state.sessions+" consistent sessions at controlled RPE is exactly the recapture process \u2014 this is not starting over."};
  }

  // Fallback — only when there is truly no current signal
  return {title:"Context", body:"Dec 2023 was the all-time strength peak. Sep 2025 was peak performance and peak risk. The gym switch caused a normal reset. This is a recapture phase, not a restart."};
}

// ═══════════════════════════════════════
// DERIVE INSIGHTS
// ═══════════════════════════════════════
function deriveInsights() {
  var ins = [], b = calcBanner(), S = STATE;
  var g=S.muscleVolume["Glutes"]||0, h=S.muscleVolume["Hamstrings"]||0;
  var hasData = S.imported && S.exercisesAnalyzed > 0;

  // 1. Training read — always show
  var rpeNote = "";
  if (hasData && S.avgRPE) {
    var rr = b.rpe.split("\u2013").map(parseFloat);
    if (rr.length===2) {
      if (S.avgRPE < rr[0]) rpeNote=" Avg RPE "+S.avgRPE.toFixed(1)+" is below target \u2014 push harder on working sets.";
      else if (S.avgRPE > rr[1]) rpeNote=" Avg RPE "+S.avgRPE.toFixed(1)+" is above target \u2014 watch recovery this week.";
      else rpeNote=" Avg RPE "+S.avgRPE.toFixed(1)+" is right inside the M8 target range. Calibrated.";
    }
  }
  ins.push({type:"pattern", severity:"blue",
    title:"Week "+b.week+" of "+b.totalWeeks+" \u2014 "+b.phase,
    body:b.focus+(hasData?rpeNote:" Import your Hevy CSV to see how training compares.")});

  if (!hasData) return ins;

  // 2. Stalled lifts
  if (S.stalled.length) {
    var sn = S.stalled.map(function(lk){return shortName(lk);}).join(", ");
    ins.push({type:"risk", severity:"yellow",
      title:S.stalled.length===1?"Stall detected":S.stalled.length+" lifts stalled",
      body:sn+". Same load, 3+ sessions, no rep improvement. Drop set at 70%, rep reset, or technique audit before adding weight."});
  }

  // 3. Hamstring gap
  if (g>0 && h<g*0.55)
    ins.push({type:"risk", severity:"yellow", title:"Hamstrings trailing glutes",
      body:h+" hamstring sets vs "+g+" glute sets. Hamstrings are the single biggest limiter for glute development and back health. Add 2\u20134 hard sets."});

  // 4. RPE aligned
  if (S.avgRPE) {
    var rr2 = b.rpe.split("\u2013").map(parseFloat);
    if (rr2.length===2 && S.avgRPE>=rr2[0] && S.avgRPE<=rr2[1])
      ins.push({type:"win", severity:"green", title:"Intensity on target",
        body:"Avg RPE "+S.avgRPE.toFixed(1)+" matches M8 target ("+b.rpe+"). Periodization works when intensity is dialled \u2014 you\u2019re loading correctly."});
  }

  // 5. High frequency
  if (S.sessions > 20)
    ins.push({type:"risk", severity:"orange", title:"High session count",
      body:S.sessions+" sessions is on the high side. Watch for accumulated fatigue. RPE climbing week-over-week is the first signal."});

  // 6. Priority lift near or past M8 target
  PROFILE.priorityLifts.forEach(function(lk) {
    var d=S.lifts[lk], t=PROFILE.liftTargets[lk];
    if (!d||!t||!t.M8e||!d.lastE) return;
    var pct=d.lastE/t.M8e, n=shortName(lk);
    if (pct>=1.0) ins.push({type:"win", severity:"green",
      title:n+" hit M8 target",
      body:d.lastE+" lbs e1RM \u2014 M8 target was "+t.M8e+". Set sights on M9: "+t.M9e+" lbs e1RM."});
    else if (pct>=0.85) ins.push({type:"win", severity:"green",
      title:n+" approaching M8 target",
      body:d.lastE+" lbs e1RM \u2014 "+Math.round(pct*100)+"% of M8 target. "+(t.M8e-d.lastE)+" lbs to go."});
  });

  // 7. Upper pull check
  var backSets = S.muscleVolume["Back"]||0;
  if (backSets===0) ins.push({type:"risk", severity:"orange",
    title:"No upper pull volume",
    body:"Back sets: 0 this period. At minimum one pull session per week \u2014 back definition without width comes from rowing, not lat isolation."});
  else if (backSets>=6) ins.push({type:"win", severity:"green",
    title:"Pull volume maintained",
    body:backSets+" back sets this period. Upper pull for definition, not width. Rows over pulldowns."});

  // 8. Historical lens is rendered as its own dedicated card in renderInsights
  // via pickHistoricalLens() — not duplicated here.

  // 9. Priority recommendation
  var rec;
  if (S.stalled.length) {
    var fn2 = shortName(S.stalled[0]);
    rec = {type:"priority", severity:"orange", title:"Priority: break the "+fn2+" stall",
      body:"Don\u2019t add weight. Add a drop set at 70% AMRAP, or run 3\u00d75 with controlled tempo. Progression resumes when reps open up again."};
  } else if (g>0&&h<g*0.55) {
    rec = {type:"priority", severity:"orange", title:"Priority: add hamstring volume",
      body:"2\u20134 sets of RDL or Seated Leg Curl before your next posterior chain session. Don\u2019t skip Lying Leg Curl \u2014 it hits the angle RDL doesn\u2019t."};
  } else if (b.phase==="Strength"||b.phase==="Load"||b.phase==="Peak") {
    rec = {type:"priority", severity:"blue", title:"Priority: load progression",
      body:"Week "+b.week+" is a push week. Move heavier, not longer. Hit your top set, hit your back-offs, and move on. Quality of overload beats quantity of exercises."};
  } else {
    rec = {type:"priority", severity:"green", title:"Priority: protect the cadence",
      body:"Everything is on track. The highest-leverage action right now is consistent attendance. Session quality compounds \u2014 don\u2019t let perfect block frequent."};
  }
  ins.push(rec);

  return ins;
}

// ═══════════════════════════════════════
function parseHevyDate(dt) {
  dt = (dt || "").replace(/"/g,"").trim();
  if (!dt) return null;
  if (/^\d{4}-\d{2}-\d{2}/.test(dt)) {
    var dk = dt.substring(0,10);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return null;
    return {dateKey:dk, timestamp:new Date(dk+"T12:00:00").getTime()};
  }
  var MO = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  var m = dt.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})/);
  if (m) {
    var day=parseInt(m[1],10), mon=MO[m[2]], yr=parseInt(m[3],10);
    if (mon===undefined||isNaN(day)||isNaN(yr)) return null;
    var p=function(n){return n<10?"0"+n:""+n;};
    return {dateKey:yr+"-"+p(mon+1)+"-"+p(day), timestamp:new Date(yr,mon,day,12,0,0).getTime()};
  }
  return null;
}

function parseCSVLine(line) {
  var res=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===","&&!inQ){res.push(cur.trim());cur="";}
    else{cur+=ch;}
  }
  res.push(cur.trim());
  return res;
}

function parseHevy(text) {
  var lines = text.split("\n").filter(function(l){return l.trim();});
  if (lines.length < 2) { alert("File looks empty."); return; }

  var raw = parseCSVLine(lines[0]);
  var hdr = {};
  raw.forEach(function(h,i){ hdr[h.replace(/"/g,"").trim()] = i; });

  // Required columns (weight handled flexibly below)
  var baseNeeded = ["exercise_title","start_time","set_type","reps"];
  for (var ni=0; ni<baseNeeded.length; ni++) {
    if (hdr[baseNeeded[ni]] === undefined) {
      alert("Missing column: " + baseNeeded[ni] + "\nIs this a Hevy CSV?");
      return;
    }
  }
  var hasLbs = hdr["weight_lbs"] !== undefined;
  var hasKg  = hdr["weight_kg"]  !== undefined;
  if (!hasLbs && !hasKg) {
    alert("No weight column found.\nExpected weight_lbs or weight_kg.");
    return;
  }

  // Diagnostics
  var diag = {
    totalRows:0, skippedBadDate:0, skippedDateRange:0,
    skippedSetType:0, skippedMissingWeight:0,
    skippedMissingReps:0, skippedZeroWeight:0, importedRows:0
  };

  var byEx = {}, byDate = {}, rawRPEs = [], allDates = [], cutoff = null;
  if (_importWeeks > 0) {
    cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - _importWeeks * 7);
  } else if (_importCustomStart) {
    cutoff = _importCustomStart;
  }
  // _importWeeks === -1 means "All time" — no cutoff

  var minDate = null, maxDate = null;

  for (var li = 1; li < lines.length; li++) {
    var v = parseCSVLine(lines[li]);
    diag.totalRows++;

    var exName = (v[hdr["exercise_title"]] || "").replace(/"/g,"").trim();
    var dt     = (v[hdr["start_time"]]     || "").replace(/"/g,"").trim();
    var stype  = (v[hdr["set_type"]]       || "").replace(/"/g,"").trim().toLowerCase();
    var rp     = parseInt(v[hdr["reps"]]);

    // Weight: prefer lbs, fall back to kg→lbs
    var wt;
    if (hasLbs) {
      wt = parseFloat((v[hdr["weight_lbs"]] || "").replace(/"/g,""));
      if ((isNaN(wt) || wt <= 0) && hasKg) {
        wt = parseFloat((v[hdr["weight_kg"]] || "").replace(/"/g,"")) * 2.20462;
      }
    } else {
      wt = parseFloat((v[hdr["weight_kg"]] || "").replace(/"/g,"")) * 2.20462;
    }

    var rpe2 = hdr["rpe"] !== undefined ? parseFloat((v[hdr["rpe"]] || "").replace(/"/g,"")) : NaN;

    // Validate date — handles ISO and Hevy "3 Jul 2026, 13:51" formats
    var parsedDate = parseHevyDate(dt);
    if (!parsedDate) { diag.skippedBadDate++; continue; }
    var dateKey = parsedDate.dateKey;
    var rowDate = new Date(parsedDate.timestamp);

    // Date range filter
    if (cutoff && rowDate < cutoff) { diag.skippedDateRange++; continue; }

    // Set type filter — normalize, accept working sets only
    // Skip only clearly labelled warmup or drop sets
    var skipTypes = ["warmup","warm up","warm-up","dropset","drop set","drop-set","failure_end"];
    if (skipTypes.indexOf(stype) !== -1) { diag.skippedSetType++; continue; }
    // Accept: normal, failure, working, "", blank — anything not explicitly a warmup/drop

    // Weight
    if (isNaN(wt) || wt === undefined) { diag.skippedMissingWeight++; continue; }
    if (wt <= 0) { diag.skippedZeroWeight++; continue; }

    // Reps
    if (isNaN(rp) || rp <= 0) { diag.skippedMissingReps++; continue; }

    // Row is valid — count it
    diag.importedRows++;
    if (!minDate || dateKey < minDate) minDate = dateKey;
    if (!maxDate || dateKey > maxDate) maxDate = dateKey;
    if (!isNaN(rpe2) && rpe2 > 0) rawRPEs.push(rpe2);
    if (allDates.indexOf(dateKey) === -1) allDates.push(dateKey);

    var mapped = normalizeExerciseName(exName);
    // Per-date log (Map week detail)
    if (!byDate[dateKey]) byDate[dateKey] = {sets:0, rpes:[], ex:{}};
    byDate[dateKey].sets++;
    if (!isNaN(rpe2) && rpe2 > 0) byDate[dateKey].rpes.push(rpe2);
    if (!byEx[mapped]) byEx[mapped] = {};
    var ts = rowDate.getTime();
    var setE1 = wt * (1 + rp / 30);
    var existing = byEx[mapped][dateKey];
    var hardCount = existing ? (existing.hardSets || 0) + 1 : 1;
    if (!existing || setE1 > (existing.bestSet ? existing.bestSet.e1 : 0)) {
      byEx[mapped][dateKey] = {
        bestSet: {w:wt, r:rp, rpe:isNaN(rpe2)?null:rpe2, e1:Math.round(setE1), ts:ts},
        hardSets: hardCount
      };
    } else {
      byEx[mapped][dateKey].hardSets = hardCount;
    }
    var dEx = byDate[dateKey].ex[mapped];
    if (!dEx || setE1 > dEx.e1)
      byDate[dateKey].ex[mapped] = {w:wt, r:rp, e1:Math.round(setE1), rpe:isNaN(rpe2)?null:rpe2};
  }

  // Guard: empty import — do not overwrite previous STATE
  if (Object.keys(byEx).length === 0) {
    var diagMsg = "No workout rows matched.\n\n" +
      "Diagnostics:\n" +
      "  Total rows:       " + diag.totalRows + "\n" +
      "  Skipped (date format): " + diag.skippedBadDate + "\n" +
      "  Skipped (date range):  " + diag.skippedDateRange + "\n" +
      "  Skipped (set type):    " + diag.skippedSetType + "\n" +
      "  Skipped (no weight):   " + diag.skippedMissingWeight + "\n" +
      "  Skipped (zero weight): " + diag.skippedZeroWeight + "\n" +
      "  Skipped (no reps):     " + diag.skippedMissingReps + "\n\n" +
      "Try: All time range, or check your CSV export settings.";
    var banner = document.getElementById("importBanner");
    banner.innerHTML = "&#9888; Import failed — " + diag.totalRows + " rows read, 0 matched. Check Import tab for details.";
    banner.style.background = "#ff453a14";
    banner.style.borderBottomColor = "#ff453a30";
    banner.style.color = "var(--re)";
    banner.style.display = "flex";
    // Store diagnostics for Import tab to display
    window._lastDiag = diag;
    renderImportTab();
    alert(diagMsg);
    return;
  }

  window._lastDiag = null; // clear diagnostics on success
  var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fd(s) { var p=s.split("-"); return mo[parseInt(p[1])-1]+" "+parseInt(p[2]); }
  populateState(byEx, rawRPEs, allDates.length,
    {start: minDate ? fd(minDate) : "\u2014", end: maxDate ? fd(maxDate) : "\u2014"}, byDate);
}

function populateState(byEx,rawRPEs,sessionCount,dateRange,byDate) {
  if (!byEx || Object.keys(byEx).length === 0) return; // safety — caller should catch this
  // Snapshot current lifts before overwriting
  STATE.prevLifts = JSON.parse(JSON.stringify(STATE.lifts));
  STATE.lifts = {};
  STATE.muscleVolume = {};
  STATE.dailyLog = byDate || {};
  STATE.sessions = sessionCount;
  STATE.dateRange = dateRange;
  STATE.exercisesAnalyzed = Object.keys(byEx).length;
  STATE.avgRPE = rawRPEs.length ? rawRPEs.reduce(function(a,b){return a+b;},0)/rawRPEs.length : null;
  STATE.imported = true;
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  Object.keys(byEx).forEach(function(ex) {
    var dates=Object.keys(byEx[ex]).sort();
    var latest=dates[dates.length-1];
    var entry=byEx[ex][latest];
    var best=entry.bestSet||entry;
    var e1=best.e1||Math.round(best.w*(1+best.r/30));
    var stuck=0;
    for(var di=dates.length-1;di>=0;di--){
      var entry2=byEx[ex][dates[di]];
      var dW=(entry2.bestSet?entry2.bestSet.w:entry2.w)||0;
      if(Math.abs(dW-best.w)<2.5) stuck++;
      else break;
    }
    var tgt=PROFILE.liftTargets[ex]||{targetR:8};
    var dp=latest.split("-");
    var dStr=mo[parseInt(dp[1])-1]+" "+parseInt(dp[2]);
    STATE.lifts[ex]={lastW:best.w,lastR:best.r,lastRPE:best.rpe,lastE:e1,
      sessionsAtWeight:stuck,targetR:tgt.targetR,d:dStr,ts:best.ts||0,e1:e1};
    var muscle=PROFILE.muscleMap[ex];
    if(muscle){
      var totalSets=0;
      dates.forEach(function(dt){
        var en=byEx[ex][dt]; totalSets+=(en.hardSets||1);
      });
      STATE.muscleVolume[muscle]=(STATE.muscleVolume[muscle]||0)+totalSets;
    }
  });
  runEngine();
  renderDashboard(); renderWhatChanged(); renderNextWeek(); renderMap(); renderInsights(); renderAudit(); renderImportTab();
  renderNextSessionCoach();
  saveState();
  saveImportHistory();
  var imported=Object.keys(byEx).length;
  var banner=document.getElementById("importBanner");
  banner.innerHTML="\u2713 "+imported+" exercises \u2022 "+sessionCount+" sessions \u2022 "+STATE.improved.length+" improving \u2022 "+STATE.warnings.length+" warnings";
  banner.style.display="flex";
}

function showPool(k) {
  var pool=POOL[k];
  document.getElementById("exPool").style.display="block";
  document.getElementById("activeSess").style.display="none";
  var warmups=pool.exercises.filter(function(e){return e.wu;});
  var working=pool.exercises.filter(function(e){return !e.wu;});
  var html="<div style='font-size:11px;color:var(--t2);margin-bottom:12px;line-height:1.5'>"+pool.nt+"</div>";
  if(warmups.length){
    html+="<div class='pool-lbl'>Warmup (always)</div>";
    html+=warmups.map(function(ex){
      return "<div class='pool-item pool-wu'><div class='pchk on'>\u2713</div><div class='pinfo'><div class='pname'>"+ex.n+"</div></div></div>";
    }).join("");
  }
  html+="<div class='pool-lbl'>Working sets \u2014 pick today</div>";
  html+=working.map(function(ex){
    var on=_selected[ex.n];
    var d=STATE.lifts[ex.lk||ex.n];
    var lastStr=d?"<span class='plast'>"+d.d+" \u2022 "+d.lastW+" lbs \u00d7"+d.lastR+"</span>":"";
    var ts=_timers[ex.n]||120;
    var m=Math.floor(ts/60),s=ts%60;
    var tstr=ts?(m+":"+(s<10?"0":"")+s):"off";
    var safeN=ex.n.replace(/'/g,"&apos;");
    return "<div class='pool-item"+(on?" pool-on":"")+"' data-ex='"+safeN+"'>"+
      "<div class='pchk"+(on?" on":"")+"'>"+(on?"\u2713":"")+"</div>"+
      "<div class='pinfo'><div class='pname'>"+ex.n+"</div>"+lastStr+(ex.fl?"<div class='pflag'>\u2691 "+ex.fl+"</div>":"")+
      "</div><div class='ptimer' data-ex='"+safeN+"'>\u23f1 "+tstr+"</div></div>";
  }).join("");
  var count=working.filter(function(e){return _selected[e.n];}).length;
  html+="<button class='start-btn' onclick='startSession()'>\u25b6 Start Session <span style='font-size:11px;opacity:.7'>"+count+" exercises</span></button>";
  document.getElementById("poolList").innerHTML=html;
  document.querySelectorAll("#poolList .pool-item:not(.pool-wu)").forEach(function(item){
    item.addEventListener("click",function(e){
      if(e.target.closest(".ptimer")) return;
      var n=this.dataset.ex;
      _selected[n]=!_selected[n];
      var chk=this.querySelector(".pchk");
      chk.classList.toggle("on",_selected[n]);
      chk.textContent=_selected[n]?"\u2713":"";
      this.classList.toggle("pool-on",_selected[n]);
      var cnt=POOL[_sessKey].exercises.filter(function(e){return !e.wu&&_selected[e.n];}).length;
      var btn=document.querySelector(".start-btn");
      if(btn) btn.innerHTML="\u25b6 Start Session <span style='font-size:11px;opacity:.7'>"+cnt+" exercises</span>";
    });
  });
  document.querySelectorAll("#poolList .ptimer").forEach(function(tim){
    tim.addEventListener("click",function(e){
      e.stopPropagation();
      var n=this.dataset.ex;
      var opts=[60,90,120,180,240,0];
      var cur=_timers[n]||120;
      var nv=opts[(opts.indexOf(cur)+1)%opts.length];
      _timers[n]=nv;
      var m=Math.floor(nv/60),s=nv%60;
      this.textContent="\u23f1 "+(nv?(m+":"+(s<10?"0":"")+s):"off");
    });
  });
}

function startSession() {
  document.getElementById("exPool").style.display="none";
  document.getElementById("activeSess").style.display="block";
  var chosen=POOL[_sessKey].exercises.filter(function(e){return e.wu||_selected[e.n];});
  // Generate coaching signals from STATE
  var signals=[];
  chosen.forEach(function(ex){
    if(!ex.lk||!STATE.lifts[ex.lk]||ex.wu) return;
    var rec=STATE.recommendations[ex.lk];
    if(rec&&rec.action&&rec.action!=="building") signals.push(rec);
  });
  var h="";
  if(signals.length){
    var aC={increase:"var(--gr)",hold:"var(--bl)",reduce:"var(--re)",stall:"var(--am)",injury:"var(--re)"};
    h="<div class='coach-brief'><div class='coach-brief-hd'>\u26a1 Pre-session signals</div>"+
      signals.map(function(s){
        var col=aC[s.action]||"var(--t2)";
        return "<div class='cbrow'><span class='cbbadge' style='color:"+col+"'>"+s.badge+"</span>"+
          "<div><div class='cbname'>"+shortName(s.lift)+"</div>"+
          "<div class='cbreason'>"+s.reason+"</div>"+
          (s.caution?"<div class='cbcaution'>"+s.caution+"</div>":"")+"</div></div>";
      }).join("")+"</div>";
  }
  h+="<div style='display:flex;align-items:center;justify-content:space-between;padding:8px 16px 0'>" +
    "<button onclick='backToPool()' style='font-size:12px;font-weight:600;background:none;border:none;color:var(--t2);cursor:pointer'>&larr; Change</button>" +
    "<span id='sessProgress' style='font-size:12px;font-weight:700;color:var(--t2)'>0/0 sets</span>" +
    "<button id='addExBtn' style='font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--or);background:#e8673a14;color:var(--or);cursor:pointer'>+ Add</button>" +
  "</div>";
  chosen.forEach(function(ex,ei){h+=buildCard(ex,ei,_timers[ex.n]||0);});
  document.getElementById("el").innerHTML=h;
  updateProgress();
}

function backToPool() {
  if(_activeTimer.interval) clearInterval(_activeTimer.interval);
  document.getElementById("timerBar").style.display="none";
  document.getElementById("exPool").style.display="block";
  document.getElementById("activeSess").style.display="none";
}

function buildCard(ex,ei,timerSec) {
  var d=ex.lk?STATE.lifts[ex.lk]:null;
  var e1str=d?"<span class='ec-s'>Last: "+d.d+" \u2022 e1RM "+d.lastE+" lbs</span>":"";
  // Suggested target from recommendations
  var rec=ex.lk?STATE.recommendations[ex.lk]:null;
  var recStr=rec?"<span class='ec-rec' style='color:"+(rec.action==="increase"?"var(--gr)":rec.action==="hold"?"var(--bl)":"var(--am)")+"'>Target: "+rec.target+" lbs</span>":"";
  var mins=Math.floor(timerSec/60),secs=timerSec%60;
  var tBadge=timerSec?"<span class='ec-timer' data-sec='"+timerSec+"' data-ei='"+ei+"'>\u23f1 "+mins+":"+(secs<10?"0":"")+secs+"</span>":"";
  var body="";
  if(ex.fl) body+="<div class='fgr'>\u2691 "+ex.fl+"</div>";
  if(ex.sets&&ex.sets.length){
    body+="<div class='sth'><span>SET</span><span>PREV</span><span>TARGET</span><span>RPE</span><span></span></div>";
    ex.sets.forEach(function(s,si){
      var prev=d&&d.lastW&&s.t!=="wu"?(d.lastW+" \u00d7"+(d.lastR||"?")):"&mdash;";
      var tgt=s.tw>0?(s.tw+" lbs"+(s.tr?" \u00d7"+s.tr:"")):(s.nt||"&mdash;");
      if(s.tr===0&&s.nt) tgt=s.nt;
      // Dynamic target: use recommendation target for TOP sets
      if(s.t==="top"&&rec&&rec.target&&rec.target>0){
        var recTag="<span style='font-size:9px;color:var(--or)'>▶ rec</span>";
        tgt=rec.target+" lbs ×"+(s.tr||8)+" "+recTag;
      }
      var rpe=s.rpe?"RPE "+s.rpe:"&mdash;";
      var cid="c_"+ei+"_"+si;
      body+="<div class='sr "+s.t+"'><span class='sn "+s.t+"'>"+s.lb+"</span><span class='pv'>"+prev+"</span><span class='tv'>"+tgt+"</span><span class='rv'>"+rpe+"</span>"+
        "<div class='ck' id='"+cid+"' data-ei='"+ei+"' data-ts='"+timerSec+"'></div></div>";
    });
  } else {
    body+="<div style='padding:10px 14px;font-size:11px;color:var(--t2)'>Log in Hevy.</div>";
  }
  body+="<div style='display:flex;gap:6px;padding:8px 14px 12px'>" +
    "<button class='act-btn swap-btn' data-idx='"+ei+"'>\u21c6 Swap</button>" +
    "<button class='act-btn rem-btn'>\u2715 Remove</button>" +
  "</div>";
  return "<div class='ec open' id='ex_"+ei+"'>" +
    "<div class='ec-h' data-id='ex_"+ei+"'><div><div class='ec-n'>"+ex.n+"</div>"+e1str+recStr+"</div>" +
    "<div style='display:flex;align-items:center;gap:8px'>"+tBadge+"<span class='ec-a'>&#8250;</span></div></div>" +
    "<div class='ec-b'>"+body+"</div></div>";
}

function findEx(name) {
  var keys=Object.keys(POOL);
  for(var ki=0;ki<keys.length;ki++){
    var exs=POOL[keys[ki]].exercises;
    for(var ei=0;ei<exs.length;ei++){if(exs[ei].n===name) return exs[ei];}
  }
  return null;
}

// ═══════════════════════════════════════
// EXERCISE MODAL
// ═══════════════════════════════════════
function openExModal(mode,idx) {
  _swapIdx=(mode==="swap")?idx:-1;
  document.getElementById("exModalTitle").textContent=mode==="swap"?"Swap exercise":"Add exercise";
  document.getElementById("exSearch").value="";
  renderExList("");
  document.getElementById("exModal").style.display="flex";
}
function closeExModal(){document.getElementById("exModal").style.display="none";}
function renderExList(q) {
  q=q.toLowerCase();
  var html="";
  ALL_EX.forEach(function(grp){
    var matches=grp.exs.filter(function(e){return !q||e.toLowerCase().indexOf(q)!==-1;});
    if(!matches.length) return;
    html+="<div class='ex-grp'>"+grp.g+"</div>";
    matches.forEach(function(e){
      var d=STATE.lifts[e];
      var lastStr=d?" \u2022 "+d.lastW+" lbs":"";
      html+="<div class='ex-item' data-name='"+e.replace(/'/g,"&apos;")+"'><div style='font-size:13px;font-weight:600;color:var(--tx)'>"+e+"</div><div style='font-size:10px;color:var(--t3)'>"+lastStr+"</div></div>";
    });
  });
  var list=document.getElementById("exModalList");
  list.innerHTML=html||"<div style='padding:20px;text-align:center;color:var(--t3)'>No matches</div>";
  list.querySelectorAll(".ex-item").forEach(function(item){
    item.addEventListener("click",function(){selectEx(this.dataset.name);});
  });
}
function selectEx(exName) {
  closeExModal();
  var ex=findEx(exName)||{n:exName,lk:exName,sets:[],wu:false,fl:null};
  var addTimer = _timers[ex.n] || ex.timer || 120;
  _timers[ex.n] = addTimer;
  if(_swapIdx>=0){
    var cards=document.querySelectorAll("#el .ec");
    if(cards[_swapIdx]) cards[_swapIdx].outerHTML=buildCard(ex,_swapIdx,addTimer);
  } else {
    var idx=document.querySelectorAll("#el .ec").length;
    document.getElementById("el").insertAdjacentHTML("beforeend",buildCard(ex,idx,addTimer));
  }
  updateProgress();
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function startTimer(secs) {
  if(_activeTimer.interval) clearInterval(_activeTimer.interval);
  _activeTimer.secs=secs;
  var total=secs;
  document.getElementById("timerBar").style.display="flex";
  document.getElementById("timerFill").style.width="100%";
  updateTimerDisplay();
  _activeTimer.interval=setInterval(function(){
    _activeTimer.secs--;
    if(_activeTimer.secs<=0){
      clearInterval(_activeTimer.interval);
      _activeTimer.interval=null;
      document.getElementById("timerBar").style.display="none";
      try{var a=new AudioContext();var o=a.createOscillator();o.connect(a.destination);o.frequency.value=880;o.start();o.stop(a.currentTime+0.15);}catch(e){}
    } else {
      document.getElementById("timerFill").style.width=Math.round((_activeTimer.secs/total)*100)+"%";
      updateTimerDisplay();
    }
  },1000);
}
function updateTimerDisplay(){
  var m=Math.floor(_activeTimer.secs/60),s=_activeTimer.secs%60;
  document.getElementById("timerCount").textContent=m+":"+(s<10?"0":"")+s;
}
function dismissTimer(){
  if(_activeTimer.interval) clearInterval(_activeTimer.interval);
  document.getElementById("timerBar").style.display="none";
}
function updateProgress(){
  var all=document.querySelectorAll("#el .ck").length;
  var done=document.querySelectorAll("#el .ck.done").length;
  var p=document.getElementById("sessProgress");
  if(p) p.textContent=done+"/"+all+" sets";
}
function tog(id){var e=document.getElementById(id);if(e)e.classList.toggle("open");}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function setMode(m,b) {
  document.getElementById("gym").style.display=m==="gym"?"block":"none";
  document.getElementById("ana").style.display=m==="ana"?"block":"none";
  document.querySelectorAll(".tb").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on");
  if(m==="ana") renderDashboard();
}
function iTab(id,b) {
  document.querySelectorAll(".ip").forEach(function(p){p.classList.remove("on");});
  document.querySelectorAll(".it").forEach(function(x){x.classList.remove("on");});
  var pane=document.getElementById("t-"+id);
  if(pane) pane.classList.add("on");
  b.classList.add("on");
  var fns={dash:renderDashboard,changed:renderWhatChanged,next:renderNextWeek,map:renderMap,insights:renderInsights,audit:renderAudit,import:renderImportTab};
  if(fns[id]) fns[id]();
}

// ═══════════════════════════════════════
// FILE IO
// ═══════════════════════════════════════
function onFileSelect(evt) {
  var file=evt.target.files[0];
  if(!file) return;
  var cs=document.getElementById("customStart");
  if(cs&&cs.value&&_importWeeks===0) _importCustomStart=new Date(cs.value);
  var reader=new FileReader();
  reader.onload=function(e){parseHevy(e.target.result);};
  reader.readAsText(file);
  evt.target.value="";
}
function triggerFileImport(){
  if(_importWeeks===0){
    // Custom mode — must go through doCustomImport to set the date
    var el=document.getElementById("customStart");
    if(!el||!el.value){alert("Enter a start date first.");return;}
    doCustomImport();
  } else {
    document.getElementById("csvIn").click();
  }
}

function doCustomImport(){
  var el=document.getElementById("customStart");
  if(!el) return;
  var val=el.value;
  if(!val){alert("Pick a start date.");return;}
  _importCustomStart=new Date(val);
  _importWeeks=0;
  document.getElementById("csvIn").click();
}

// ═══════════════════════════════════════
// SINGLE CLICK EVENT DELEGATION
// ═══════════════════════════════════════
document.addEventListener("click",function(e){
  // Toggle card
  var head=e.target.closest(".ec-h");
  if(head){var id=head.dataset.id;if(id) tog(id); return;}
  // Checkbox
  var ck=e.target.closest(".ck");
  if(ck){
    ck.classList.toggle("done");
    ck.textContent=ck.classList.contains("done")?"\u2713":"";
    if(ck.classList.contains("done")){
      var ts=parseInt(ck.dataset.ts||"0");
      if(ts>0) startTimer(ts);
    }
    updateProgress(); return;
  }
  // Swap
  var sw=e.target.closest(".swap-btn");
  if(sw){openExModal("swap",parseInt(sw.dataset.idx));return;}
  // Remove
  var rm=e.target.closest(".rem-btn");
  if(rm){rm.closest(".ec").remove();updateProgress();return;}
  // Timer badge cycle
  var tb=e.target.closest(".ec-timer");
  if(tb){
    var opts=[60,90,120,180,240,0];
    var cur=parseInt(tb.dataset.sec||"120");
    var nv=opts[(opts.indexOf(cur)+1)%opts.length];
    tb.dataset.sec=nv;
    var m2=Math.floor(nv/60),s2=nv%60;
    tb.textContent="\u23f1 "+(nv?(m2+":"+(s2<10?"0":"")+s2):"off");
    var card=tb.closest(".ec");
    if(card) card.querySelectorAll(".ck").forEach(function(c){c.dataset.ts=nv;});
    return;
  }
  // Status toggles
  var tgl=e.target.closest("[data-togglekey]");
  if(tgl){toggleStatus(tgl.dataset.togglekey);return;}
  // Map interactive: phase cards
  var mp=e.target.closest("[data-mapphase]");
  if(mp){showPhaseDetail(mp.dataset.mapphase);return;}
  // Map interactive: week dots
  var mw=e.target.closest("[data-mapweek]");
  if(mw){showWeekDetail(parseInt(mw.dataset.mapweek));return;}
  // Add exercise
  if(e.target.id==="addExBtn"||e.target.closest("#addExBtn")){openExModal("add",-1);return;}
  // Import range buttons
  var irb=e.target.closest(".irb");
  if(irb){
    document.querySelectorAll(".irb").forEach(function(btn){btn.classList.remove("on");});
    irb.classList.add("on");
    var weeks=parseInt(irb.dataset.w||"4");
    _importWeeks=weeks;
    var wrap=document.getElementById("customWrap");
    if(wrap) wrap.style.display=weeks===0?"flex":"none";
    if(weeks!==0) document.getElementById("csvIn").click();
    return;
  }
});


// ═══════════════════════════════════════
// LOCALSTORAGE PERSISTENCE
// ═══════════════════════════════════════

function toggleStatus(key) {
  if (!(key in CURRENT_STATUS)) return;
  CURRENT_STATUS[key] = !CURRENT_STATUS[key];
  saveCurrentStatus();
  renderCoachCard();
  renderStatusToggles();
  runEngine();
  renderDashboard();
  renderNextWeek();
  renderAudit();
  renderNextSessionCoach();
}

function saveCurrentStatus() {
  try { localStorage.setItem("ti_status", JSON.stringify(CURRENT_STATUS)); }
  catch(e) { console.warn("Could not save status:", e); }
}

function restoreCurrentStatus() {
  try {
    var raw = localStorage.getItem("ti_status");
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s && typeof s === "object") {
      ["kneePain","ankleIssue","backTightness","lowRecovery"].forEach(function(k){
        if (typeof s[k] === "boolean") CURRENT_STATUS[k] = s[k];
      });
    }
  } catch(e) { console.warn("Could not restore status:", e); }
}

function renderStatusToggles() {
  var el = document.getElementById("statusToggles");
  if (!el) return;
  var items = [
    {key:"kneePain",      label:"Knee pain"},
    {key:"ankleIssue",    label:"Ankle issue"},
    {key:"backTightness", label:"Back tight"},
    {key:"lowRecovery",   label:"Low recovery"}
  ];
  var html = "";
  items.forEach(function(item) {
    var on = CURRENT_STATUS[item.key];
    html += "<button class='stoggle" + (on ? " stoggle-on" : "") +
      "' data-togglekey='" + item.key + "'>" +
      (on ? "● " : "○ ") + item.label + "</button>";
  });
  el.innerHTML = html;
}
function saveState() {
  try {
    localStorage.setItem('ti_state', JSON.stringify({
      lifts: STATE.lifts,
      prevLifts: STATE.prevLifts,
      muscleVolume: STATE.muscleVolume,
      dailyLog: STATE.dailyLog,
      sessions: STATE.sessions,
      dateRange: STATE.dateRange,
      exercisesAnalyzed: STATE.exercisesAnalyzed,
      avgRPE: STATE.avgRPE,
      imported: STATE.imported,
      ts: Date.now()
    }));
  } catch(e) { console.warn('Could not save state:', e); }
}

function restoreState() {
  try {
    var raw = localStorage.getItem('ti_state');
    if (!raw) return false;
    var saved = JSON.parse(raw);
    if (!saved || !saved.imported) return false;
    STATE.lifts = saved.lifts || {};
    STATE.prevLifts = saved.prevLifts || {};
    STATE.muscleVolume = saved.muscleVolume || {};
    STATE.dailyLog = saved.dailyLog || {};
    STATE.sessions = saved.sessions || 0;
    STATE.dateRange = saved.dateRange || {start:null,end:null};
    STATE.exercisesAnalyzed = saved.exercisesAnalyzed || 0;
    STATE.avgRPE = saved.avgRPE || null;
    STATE.imported = saved.imported || false;
    runEngine();
    return true;
  } catch(e) { console.warn('Could not restore state:', e); return false; }
}

// ═══════════════════════════════════════
// SINGLE DOMContentLoaded INIT
// ═══════════════════════════════════════
document.addEventListener("DOMContentLoaded",function(){
  restoreImportHistory();
  restoreCurrentStatus();
  renderCoachCard();
  renderStatusToggles();
  var restored = restoreState();
  renderNextSessionCoach();
  if (restored) {
    renderDashboard(); renderWhatChanged(); renderNextWeek(); renderMap(); renderInsights(); renderAudit(); renderImportTab();
    var banner = document.getElementById("importBanner");
    banner.innerHTML = "&#9654; Restored from last import &bull; " + (STATE.dateRange.end||"");
    banner.style.display = "flex";
  } else {
    renderDashboard();
    renderImportTab();
    renderMap();
  }
});
